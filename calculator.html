<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to right,#141e30,#243b55);
    }

    .calculator{
      background:white;
      padding:30px;
      border-radius:15px;
      text-align:center;
      width:350px;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    h2{
      margin-bottom:20px;
      color:#333;
    }

    p{
      margin-bottom:10px;
      color:#555;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border:2px solid #ccc;
      border-radius:8px;
      font-size:16px;
    }

    input:focus{
      border-color:#007bff;
      outline:none;
    }

    button{
      padding:12px 25px;
      border:none;
      background:#007bff;
      color:white;
      font-size:16px;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#0056b3;
    }

    #result{
      margin-top:20px;
      font-size:20px;
      font-weight:bold;
      color:#222;
    }

  </style>

</head>

<body>
<div class="calculator">
   <h2>Calculator</h2>

    <p>Enter Expression:</p>

    <input id="expression" type="text" placeholder="Example: 5+5*2">

    <button onclick="calculate()">Calculate</button>

    <p id="result"></p>
 </div>

  <script>

    function calculate() {

      let expr = document.getElementById("expression").value;

      try {
        let result = eval(expr);
        document.getElementById("result").innerText = "Result: " + result;}

      catch (e) {
        document.getElementById("result").innerText = "Invalid Expression!";}
    }

  </script>

</body>
</html>
